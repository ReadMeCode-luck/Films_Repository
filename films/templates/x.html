<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация и Авторизация</title>
    <style>
        :root {
            --bg-color: #121318;
            --card-bg: #1a1b22;
            --input-bg: #22232a;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --accent-color: #e52e2e;
            --accent-hover: #b82020;
            --border-color: #2f303a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
        }

        .header-section {
            margin-bottom: 30px;
            position: relative;
        }

        /* Увеличенная и утолщенная кнопка назад */
        .back-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 38px;
            line-height: 1;
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-block;
            transition: transform 0.2s, color 0.2s;
            padding: 0 5px;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            color: var(--accent-color);
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper span.icon {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 45px 14px 40px; /* Увеличили правый отступ для иконки глаза */
            background-color: var(--input-bg);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--accent-color);
        }

        /* Стиль для кнопки переключения видимости пароля */
        .input-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .input-wrapper .toggle-password:hover {
            color: var(--text-main);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-me input {
            display: none;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            border: 2px solid var(--accent-color);
            border-radius: 4px;
            margin-right: 8px;
            display: inline-block;
            position: relative;
        }

        .remember-me input:checked + .checkbox-custom::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 4px;
            height: 8px;
            border: solid var(--accent-color);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .forgot-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 25px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .switch-form {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .switch-form a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .switch-form a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- БЛОК РЕГИСТРАЦИИ -->
    <div class="auth-container" id="register-card">
        <div class="header-section">
            <button class="back-btn">&#129120;</button> <!-- Использована более плотная стрелка -->
            <h2>Create Account ✨</h2>
            <p class="subtitle">Please fill in the details to sign up.</p>
        </div>

        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <span class="icon">&#128100;</span>
                    <input type="text" placeholder="Your Name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <span class="icon">&#9993;</span>
                    <input type="email" placeholder="Email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="icon">&#128274;</span>
                    <input type="password" id="reg-pass" placeholder="Password" required>
                    <!-- Передаем в функцию сам элемент глаза (this) -->
                    <span class="toggle-password" onclick="togglePass('reg-pass', this)">👁️‍🗨️</span>
                </div>
            </div>

            <button type="submit" class="submit-btn">Sign up</button>
        </form>

        <div class="switch-form">
            Already have an account?<a href="#" onclick="switchForm('login-card', 'register-card')">Sign in</a>
        </div>
    </div>

    <!-- БЛОК АВТОРИЗАЦИИ -->
    <div class="auth-container hidden" id="login-card">
        <div class="header-section">
            <button class="back-btn" onclick="switchForm('register-card', 'login-card')">&#129120;</button>
            <h2>Welcome back 👋</h2>
            <p class="subtitle">Please enter your email & password to sign in.</p>
        </div>

        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <span class="icon">&#9993;</span>
                    <input type="email" placeholder="Email" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <span class="icon">&#128274;</span>
                    <input type="password" id="login-pass" placeholder="Password" required>
                    <span class="toggle-password" onclick="togglePass('login-pass', this)">👁️‍🗨️</span>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox">
                    <span class="checkbox-custom"></span>
                    Remember me
                </label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="submit-btn">Sign in</button>
        </form>

        <div class="switch-form">
            Don't have an account?<a href="#" onclick="switchForm('register-card', 'login-card')">Sign up</a>
        </div>
    </div>

    <script>
        function switchForm(showId, hideId) {
            document.getElementById(hideId).classList.add('hidden');
            document.getElementById(showId).classList.remove('hidden');
        }

        // Обновленная функция изменения видимости пароля и смены иконки
        function togglePass(inputId, eyeIcon) {
            const input = document.getElementById(inputId);
            if (input.type === "password") {
                input.type = "text";
                eyeIcon.innerHTML = "./image/eye.png"; // Открытый глаз, когда пароль виден
            } else {
                input.type = "password";
                eyeIcon.innerHTML = "./image/hidden"; // Закрытый/перечеркнутый глаз, когда пароль скрыт
            }
        }
    </script>
</body>
</html>
